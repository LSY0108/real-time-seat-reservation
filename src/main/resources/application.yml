server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3307/seatdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: your-very-long-secret-key-your-very-long-secret-key-1234567890
  access-token-expiration-ms: 1800000      # 30분
  refresh-token-expiration-ms: 1209600000  # 14일